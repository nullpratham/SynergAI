<!DOCTYPE html>
<html>
<head>

<title>Create Account | SynergAI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

</head>

<body>

<div class="navbar">
<h2>SynergAI</h2>
</div>

<div class="hero">

<div class="left">
<h1>CREATE<br>ACCOUNT</h1>
<h3>Secure your profile</h3>
</div>

<div class="right">

<div class="login-box">

<form action="/save_account" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password"
pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
title="Must contain 1 uppercase letter, 1 number, and at least 8 characters"
placeholder="Password"
required>

<button type="submit">Create Account</button>

</form>

</div>

</div>

</div>

</body>
</html>
